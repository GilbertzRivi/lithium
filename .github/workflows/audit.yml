name: security-audit

on:
  push:
    branches: [main]
    paths:
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - "deny.toml"
      - ".github/workflows/audit.yml"
  pull_request:
    paths:
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - "deny.toml"
      - ".github/workflows/audit.yml"
  schedule:
    - cron: "0 6 * * 1"

jobs:
  # cargo-deny walks the real dependency graph (feature- and target-aware), so it
  # only flags advisories in crates actually compiled into a binary, and adds the
  # bans and sources checks. cargo-audit, which scans the raw Cargo.lock, was
  # dropped: it failed on advisories in crates never compiled here (rsa via the
  # unused sqlx-mysql driver, quinn via reqwest's unused http3 dep).
  cargo-deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans sources
