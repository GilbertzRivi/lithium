services:
  lithiumd-1:
    image: rust:1-bookworm
    restart: unless-stopped
    user: "0:1000"
    working_dir: /work
    volumes:
      - ..:/src:ro
      - ./socks:/socks
      - ./data/lithiumd-1:/data
      - target-1:/work/target
    env_file:
      - .env
    environment:
      LITHIUMD_SOCKET_PATH: /socks/lithium-1.sock
      LITHIUMD_IPC_ALLOWED_UID: "1000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - /bin/bash
      - -lc
      - |
        set -euo pipefail

        mkdir -p /socks /data /work/target
        chgrp 1000 /socks
        chmod 2770 /socks
        rm -f /socks/lithium-1.sock

        exec /usr/local/cargo/bin/cargo run \
          --manifest-path /src/lithiumd/Cargo.toml \
          --bin lithiumd \
          --release

  lithiumd-2:
    image: rust:1-bookworm
    restart: unless-stopped
    user: "0:1000"
    working_dir: /work
    volumes:
      - ..:/src:ro
      - ./socks:/socks
      - ./data/lithiumd-2:/data
      - target-2:/work/target
    env_file:
      - .env
    environment:
      LITHIUMD_SOCKET_PATH: /socks/lithium-2.sock
      LITHIUMD_IPC_ALLOWED_UID: "1000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - /bin/bash
      - -lc
      - |
        set -euo pipefail

        mkdir -p /socks /data /work/target
        chgrp 1000 /socks
        chmod 2770 /socks
        rm -f /socks/lithium-2.sock

        exec /usr/local/cargo/bin/cargo run \
          --manifest-path /src/lithiumd/Cargo.toml \
          --bin lithiumd \
          --release

volumes:
  target-1:
  target-2: