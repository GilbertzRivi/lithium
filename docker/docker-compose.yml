services:
  lithiumd-1:
    image: rust:1-bookworm
    restart: unless-stopped
    working_dir: /work
    volumes:
      - ..:/src:ro
      - ./socks:/socks
      - ./data/lithiumd-1:/data
      - target-1:/work/target
    environment:
      HOME: /tmp
      CARGO_TARGET_DIR: /work/target
      LITHIUMD_DATA_DIR: /data
      LITHIUMD_SOCKET_PATH: /run/lithiumd/lithiumd.sock
      LITHIUM_SERVER_URL: http://host.docker.internal:4108
      SERVER_X25519: "af522c5a0a203cf099ad37710562dc38997aecd21926b92580f4302e94a6207c"
      SERVER_KYBER: ""
      SERVER_ED25519: "7e3626ec530c83aaf81ec655d21e9054ee0d8f047f4fb1ef11fe19105d992e7f"
      SERVER_DILITHIUM: ""
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - /bin/bash
      - -lc
      - |
        set -euo pipefail
        
        apt-get update
        apt-get install -y --no-install-recommends socat
        rm -rf /var/lib/apt/lists/*
      
        mkdir -p /run/lithiumd /socks /data /work/target
        socat_pid=''
        
        /usr/local/cargo/bin/cargo run --manifest-path /src/lithiumd/Cargo.toml --bin lithiumd --release &
        daemon_pid=$$!
        
        trap 'kill "$$daemon_pid" 2>/dev/null || true; [ -n "$$socat_pid" ] && kill "$$socat_pid" 2>/dev/null || true' EXIT INT TERM
        
        for i in $$(seq 1 300); do
          [ -S /run/lithiumd/lithiumd.sock ] && break
          sleep 0.1
        done
        
        [ -S /run/lithiumd/lithiumd.sock ]
        
        rm -f /socks/lithium-1.sock
        socat UNIX-LISTEN:/socks/lithium-1.sock,fork,unlink-early,mode=666 UNIX-CONNECT:/run/lithiumd/lithiumd.sock &
        socat_pid=$$!
        
        wait $$daemon_pid

  lithiumd-2:
