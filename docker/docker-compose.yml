services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: lithium
      POSTGRES_DB: lithium
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_password
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lithium -d lithium"]
      interval: 5s
      timeout: 3s
      retries: 20

  app:
    image: rust:latest
    working_dir: /app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4108:4108"
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: lithium
      DB_NAME: lithium
      DB_PASSWORD_FILE: /run/secrets/db_password
      LITHIUM_BIND: 0.0.0.0
    secrets:
      - db_password
    volumes:
      - ../lithium_core:/lithium_core
      - ../lithiums:/app
      - lithium_keys:/var/lib/lithiums
      - cargo_target:/app/target
    command:
      - /usr/local/cargo/bin/cargo
      - run
      - --release

secrets:
  db_password:
    file: ./secrets/db_password.txt

volumes:
  lithium_keys:
  cargo_target: